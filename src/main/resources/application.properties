spring.profiles.active=franchise-admin
server.port=444
server.servlet.context-path=/pos/api
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Directory where POS images are stored on disk.
# Path is relative to the working directory of the running server.
# Change to an absolute path in production (e.g. /opt/pos/uploads/pos-images).
app.upload.dir=uploads/pos-images

# Application version — injected from pom.xml at build time via Maven resource filtering
app.version=@project.version@