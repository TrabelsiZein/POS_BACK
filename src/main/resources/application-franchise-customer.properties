# ============================================================
# Franchise Customer profile
# The app runs as a franchise client connected to a central admin.
# Items and supply invoices are synced from the admin.
# Sales are pushed automatically to the admin on a schedule.
# Always standalone = true (no ERP).
#
# Activate with: spring.profiles.active=franchise-customer
# ============================================================

# --- Database (SQL Server) ---
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=pos_franchise_client
spring.datasource.username=sa
spring.datasource.password=admin@123.0
spring.jpa.hibernate.ddl-auto=update

# --- App mode (franchise customer is always standalone) ---
application.standalone=true
erp.dynamicsnav.enabled=false
erp.sync.enabled=false
pos.pricing.enable-sales-price-group=false

# --- Franchise ---
franchise.admin=false
franchise.customer=true
# Base URL of the franchise admin instance (no trailing slash)
franchise.remote.url=http://127.0.0.1:444/pos/api/
# Shared API key — must match the value in the franchise admin instance
franchise.api-key=a7f3c9e2-4b1d-4f8a-9c6e-1d2b3e4f5a6b
# Cron expression for automatic sales push to admin (default: every 15 minutes)
franchise.sync.sales.cron=0 */1 * * * *
# Allow franchise client to add/manage its own local items (from other vendors).
# Admin-synced items remain read-only regardless of this setting. Default: false.
franchise.customer.allow-local-items=false

# --- Logging ---
logging.level.root=INFO
