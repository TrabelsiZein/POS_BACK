# Standalone profile: POS runs without ERP (no Dynamics NAV / Business Central).
# Activate with: spring.profiles.active=standalone (or include 'standalone' in active profiles).
# Combine with dev/production as needed, e.g. standalone,dev or standalone,production.
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
# SQL Server Express uses a dynamic TCP port by default; JDBC then needs SQL Browser (UDP 1434), which often times out if Browser is off or firewall blocks it.
# Recommended: assign a fixed port in SQL Server Configuration Manager — TCP/IP for SQLEXPRESS → IPAll → clear "TCP Dynamic Ports", set "TCP Port" = 14330 → restart SQL Server (SQLEXPRESS). No Browser needed.
spring.datasource.url=jdbc:sqlserver://127.0.0.1:14330;databaseName=pos_db;encrypt=true;trustServerCertificate=true
# Alternative: start Windows service "SQL Server Browser" (SQLBrowser) as Automatic + allow UDP 1434 in firewall, then use:
# spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=pos_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=admin@123.0
spring.jpa.hibernate.ddl-auto=update

application.standalone=true

erp.dynamicsnav.enabled=false
erp.sync.enabled=false
pos.pricing.enable-sales-price-group=true

logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.format_sql=true

app.upload.dir=C://zsretail/uploads/pos-images
