# ============================================================
# Franchise Admin profile
# The app runs as the central HQ / master node for franchise clients.
# It exposes sync APIs (items, invoices, sales receiver) and
# behaves like standalone for all normal POS operations.
#
# Activate with: spring.profiles.active=franchise-admin
# ============================================================

# --- Database (SQL Server) ---
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=pos_franchise_admin
spring.datasource.username=sa
spring.datasource.password=admin@123.0
spring.jpa.hibernate.ddl-auto=update

# --- App mode ---
application.standalone=true
erp.dynamicsnav.enabled=false
erp.sync.enabled=false
pos.pricing.enable-sales-price-group=false

# --- Licensing ---
# IMPORTANT: Set this to the appId used when generating the license for this customer
app.id=POS-FRANCHISE-ADMIN-001

# --- Franchise ---
franchise.admin=true
franchise.customer=false
# Shared API key — must match the value configured in all franchise customer instances
franchise.api-key=a7f3c9e2-4b1d-4f8a-9c6e-1d2b3e4f5a6b

# --- Logging ---
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.format_sql=true
